<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign Up | RoozGar</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 4rem auto;
            padding: 0 1.5rem;
        }

        .auth-tab {
            display: flex;
            background: #e2e8f0;
            padding: 0.25rem;
            border-radius: 0.5rem;
            margin-bottom: 2rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.6rem;
            border-radius: 0.4rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-secondary);
            background: transparent;
        }

        .tab-btn.active {
            background: white;
            color: var(--text-primary);
            box-shadow: var(--shadow-sm);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent-blue);
        }
    </style>
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">RoozGar</a>
            </nav>
        </div>
    </header>

    <main class="auth-container animate-fade">
        <div class="card glass">
            <h1 style="text-align: center; margin-bottom: 0.5rem; font-size: 1.5rem;">Welcome to RoozGar</h1>
            <p style="text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem;">Please
                enter your details to continue</p>

            <div class="auth-tab">
                <button class="tab-btn active" id="householdTab">Household</button>
                <button class="tab-btn" id="workerTab">Worker</button>
            </div>

            <form id="authForm"
                onsubmit="event.preventDefault(); localStorage.setItem('justLoggedIn', 'true'); window.location.href='index.html';">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
            </form>

            <div
                style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color); text-align: center;">
                <p style="font-size: 0.9rem; color: var(--text-secondary);">
                    Don't have an account? <a href="#" style="color: var(--accent-blue); font-weight: 600;">Sign Up</a>
                </p>
            </div>
        </div>
    </main>

    <script>
        const householdTab = document.getElementById('householdTab');
        const workerTab = document.getElementById('workerTab');
        const submitBtn = document.querySelector('button[type="submit"]');

        householdTab.addEventListener('click', () => {
            householdTab.classList.add('active');
            workerTab.classList.remove('active');
            submitBtn.style.backgroundColor = 'var(--accent-blue)';
        });

        workerTab.addEventListener('click', () => {
            workerTab.classList.add('active');
            householdTab.classList.remove('active');
            submitBtn.style.backgroundColor = 'var(--accent-green)';
        });
    </script>
</body>

</html>
